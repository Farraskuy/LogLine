name: logline
description: Offline-first Flutter logbook and notes app with Markdown, Hive, MongoDB Atlas sync, collaborators, and YOLO-powered camera-to-text OCR.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  camera: ^0.11.0+2
  connectivity_plus: ^7.0.0
  flutter_markdown: ^0.7.7+1
  flutter_secure_storage: ^10.0.0-beta.4
  google_mlkit_text_recognition: ^0.15.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.6.0
  image: ^4.5.4
  local_auth: ^3.0.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  tflite_flutter: ^0.12.1
  uuid: ^4.5.2
  workmanager: ^0.9.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
